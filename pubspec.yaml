name: chuk_chat
description: "Chuk Chat — AI chat client for all platforms."

version: 1.0.42

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  http: ^1.5.0
  dio: ^5.4.0
  flutter_svg: ^2.2.2
  file_picker: ^10.3.3
  image_picker: ^1.1.2
  uuid: ^4.5.2
  permission_handler: ^12.0.1
  supabase_flutter: ^2.10.3
  crypto: ^3.0.6
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.4
  share_plus: ^12.0.1
  package_info_plus: ^9.0.0
  record: ^6.1.2
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  markdown_widget: ^2.3.2+8
  markdown: ^7.3.0
  flutter_math_fork: ^0.7.2
  highlight: ^0.7.0
  web_socket_channel: ^3.0.1
  archive: ^4.0.7
  desktop_drop: ^0.7.0
  tray_manager: ^0.5.1
  window_manager: ^0.5.1
  image: ^4.3.0
  pdfx: ^2.8.0  # PDF viewing
  flutter_foreground_task: ^8.11.0  # Keep streaming alive when app backgrounded
  flutter_local_notifications: ^18.0.1  # Completion notifications with deep linking
  pasteboard: ^0.4.0
  flutter_map: ^8.2.2          # Map widget for displaying locations/routes
  maplibre: ^0.3.2             # 3D-capable interactive maps
  latlong2: ^0.9.1              # Coordinate math (LatLng type)
  fl_chart: ^1.1.1              # Chart rendering (bar, line, pie, scatter, radar)
  geolocator: ^14.0.2           # GPS geolocation for device tools
  add_2_calendar: ^3.0.1        # Native calendar event creation
  enough_mail: ^2.1.6           # IMAP/SMTP email
  timezone: ^0.10.0             # Timezone data for notifications
  pretty_qr_code: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - web/icons/Icon-512.png
    - windows/runner/resources/app_icon.ico

msix_config:
  display_name: chuk_chat
  publisher_display_name: chuk Development
  identity_name: chuk.chat
  publisher: CN=chuk Development
  msix_version: 1.0.0.0
  logo_path: web/icons/Icon-512.png
  capabilities: internetClient
  store: false
