name: Bug Report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below so we can help you.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you using?
      options:
        - Android
        - Linux
        - Web (chat.chuk.chat)
        - Windows
        - macOS
        - iOS
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      description: "Which version of Chuk Chat are you using? (Settings > About)"
      placeholder: "e.g. 1.0.23"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / OS Version
      description: "What device and OS version are you on?"
      placeholder: "e.g. Pixel 8 / Android 15, Ubuntu 24.04, Chrome 130"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to ...
        2. Tap on ...
        3. See error
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information that might be helpful.
    validations:
      required: false
