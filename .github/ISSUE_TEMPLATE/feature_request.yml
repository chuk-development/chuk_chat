name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea for Chuk Chat? We'd love to hear it!

  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: A clear description of the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is this related to a frustration or limitation you're experiencing?
      placeholder: "I'm always frustrated when..."
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Which platform(s) is this relevant for?
      multiple: true
      options:
        - All platforms
        - Android
        - Linux
        - Web
        - Windows
        - macOS
        - iOS
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Have you found any workarounds or alternative solutions?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, screenshots, links, or anything else that helps explain your idea.
    validations:
      required: false
