name: Cross-Platform Build & Release

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android (ARM64, ARM32, x64)'
        required: false
        default: true
        type: boolean
      build_linux_x64:
        description: 'Build Linux x86_64 (.deb, AppImage, .rpm)'
        required: false
        default: true
        type: boolean
      build_linux_arm64:
        description: 'Build Linux ARM64 (.deb, AppImage, .rpm)'
        required: false
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows (MSIX + Portable)'
        required: false
        default: true
        type: boolean
      build_macos:
        description: 'Build macOS (.dmg)'
        required: false
        default: false
        type: boolean
      build_ios:
        description: 'Build iOS (unsigned .zip)'
        required: false
        default: false
        type: boolean
      enable_signing:
        description: 'Enable Android signing (requires secrets)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: write

env:
  DISPLAY_NAME: "Chuk Chat"
  PACKAGE_NAME: "chuk-chat"
  BINARY_NAME: "chuk_chat"

jobs:
  # ──────────────────────────────────────────────
  # Cleanup old artifacts to free storage quota
  # ──────────────────────────────────────────────
  cleanup-artifacts:
    name: Cleanup Old Artifacts
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - name: Delete all existing artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all artifacts..."
          ARTIFACTS=$(gh api repos/${{ github.repository }}/actions/artifacts --paginate --jq '.artifacts[].id')
          if [ -z "$ARTIFACTS" ]; then
            echo "No artifacts to delete."
          else
            COUNT=$(echo "$ARTIFACTS" | wc -l)
            echo "Deleting $COUNT artifacts..."
            echo "$ARTIFACTS" | while read id; do
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" && echo "  Deleted $id" || echo "  Failed to delete $id"
            done
            echo "Cleanup complete."
          fi

  # ──────────────────────────────────────────────
  # Version Bump
  # ──────────────────────────────────────────────
  version-bump:
    name: Bump Version
    needs: cleanup-artifacts
    runs-on: warp-ubuntu-latest-x64-2x
    outputs:
      version: ${{ steps.bump.outputs.version }}
      version_short: ${{ steps.bump.outputs.version_short }}
      tag: ${{ steps.bump.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: bump
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          # Strip +buildnumber suffix if present
          VER=$(echo "$CURRENT" | cut -d'+' -f1)

          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "version_short=$VER" >> $GITHUB_OUTPUT
          echo "tag=v$VER" >> $GITHUB_OUTPUT
          echo "Using version: $VER"

  # ──────────────────────────────────────────────
  # Android
  # ──────────────────────────────────────────────
  build-android:
    name: Android APKs
    runs-on: warp-ubuntu-latest-x64-4x
    needs: version-bump
    if: inputs.build_android
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with: { ref: master }

      - uses: actions/setup-java@v4
        with: { distribution: zulu, java-version: '17' }

      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/build.gradle', 'android/app/build.gradle') }}
          restore-keys: gradle-

      - run: flutter pub get

      - name: Create key.properties
        if: inputs.enable_signing
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            '${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
            '${{ secrets.ANDROID_KEY_PASSWORD }}' \
            '${{ secrets.ANDROID_KEY_ALIAS }}' \
            'upload-keystore.jks' \
            > android/key.properties
          echo "key.properties created:"
          cat android/key.properties | sed 's/Password=.*/Password=***/'

      - name: Decode keystore
        if: inputs.enable_signing
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build Split APKs
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=PLATFORM_MOBILE=true \
            --dart-define=FEATURE_PROJECTS=false \
            --dart-define=FEATURE_IMAGE_GEN=false \
            --dart-define=FEATURE_VOICE_MODE=false \
            --tree-shake-icons

      - name: Rename APKs
        run: |
          TAG=${{ needs.version-bump.outputs.tag }}
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk    chuk_chat-${TAG}-android-arm64.apk   || true
          mv app-armeabi-v7a-release.apk  chuk_chat-${TAG}-android-arm32.apk   || true
          mv app-x86_64-release.apk       chuk_chat-${TAG}-android-x64.apk     || true

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/chuk_chat-*.apk
          retention-days: 1

  # ──────────────────────────────────────────────
  # Linux x86_64
  # ──────────────────────────────────────────────
  build-linux-x64:
    name: Linux x86_64
    runs-on: warp-ubuntu-latest-x64-4x
    needs: version-bump
    if: inputs.build_linux_x64
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with: { ref: master }

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev \
            dpkg-dev rpm file wget fuse libfuse2

      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }

      - run: flutter pub get

      - name: Build Linux
        run: |
          flutter build linux --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=PLATFORM_DESKTOP=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_IMAGE_GEN=false \
            --dart-define=FEATURE_VOICE_MODE=true \
            --tree-shake-icons

      - name: Create .deb package
        run: |
          TAG=${{ needs.version-bump.outputs.tag }}
          VER=${{ needs.version-bump.outputs.version_short }}
          BUNDLE=build/linux/x64/release/bundle

          mkdir -p debian/DEBIAN
          mkdir -p debian/opt/chuk-chat
          mkdir -p debian/usr/bin
          mkdir -p debian/usr/share/applications
          mkdir -p debian/usr/share/icons/hicolor/512x512/apps

          cp -r ${BUNDLE}/* debian/opt/chuk-chat/
          chmod +x debian/opt/chuk-chat/chuk_chat
          ln -s /opt/chuk-chat/chuk_chat debian/usr/bin/chuk-chat

          if [ -f web/icons/Icon-512.png ]; then
            cp web/icons/Icon-512.png debian/usr/share/icons/hicolor/512x512/apps/chuk-chat.png
          fi

          cat > debian/usr/share/applications/chuk-chat.desktop <<EOF
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Chuk Chat
          GenericName=Chat Application
          Comment=Privacy-focused AI chat with end-to-end encryption
          Exec=/opt/chuk-chat/chuk_chat
          Icon=chuk-chat
          Terminal=false
          Categories=Network;InstantMessaging;Chat;
          StartupWMClass=chuk_chat
          Keywords=chat;ai;encrypted;privacy;
          EOF

          cat > debian/DEBIAN/control <<EOF
          Package: chuk-chat
          Version: ${VER}
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: Chuk Development <support@chuk.dev>
          Homepage: https://chuk.chat
          Description: Privacy-focused AI chat with end-to-end encryption
           Chuk Chat is a cross-platform chat application that uses
           open-weight AI models with AES-256-GCM end-to-end encryption.
          Depends: libgtk-3-0, libblkid1, liblzma5
          EOF

          cat > debian/DEBIAN/postinst <<'SCRIPT'
          #!/bin/bash
          update-desktop-database /usr/share/applications 2>/dev/null || true
          gtk-update-icon-cache -f -t /usr/share/icons/hicolor 2>/dev/null || true
          SCRIPT
          chmod +x debian/DEBIAN/postinst

          dpkg-deb --build debian chuk_chat-${TAG}-linux-amd64.deb

      - name: Create AppImage
        run: |
          TAG=${{ needs.version-bump.outputs.tag }}
          BUNDLE=build/linux/x64/release/bundle

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps

          cp -r ${BUNDLE}/* AppDir/usr/bin/
          chmod +x AppDir/usr/bin/chuk_chat

          if [ -f web/icons/Icon-512.png ]; then
            cp web/icons/Icon-512.png AppDir/usr/share/icons/hicolor/512x512/apps/chuk-chat.png
            cp web/icons/Icon-512.png AppDir/chuk-chat.png
          fi

          cat > AppDir/chuk-chat.desktop <<EOF
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Chuk Chat
          Comment=Privacy-focused AI chat with end-to-end encryption
          Exec=chuk_chat
          Icon=chuk-chat
          Terminal=false
          Categories=Network;InstantMessaging;Chat;
          StartupWMClass=chuk_chat
          EOF
          cp AppDir/chuk-chat.desktop AppDir/usr/share/applications/

          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="${HERE}/usr/bin/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/chuk_chat" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir chuk_chat-${TAG}-linux-x86_64.AppImage

      - name: Create RPM package
        run: |
          TAG=${{ needs.version-bump.outputs.tag }}
          VER=${{ needs.version-bump.outputs.version_short }}
          BUNDLE=build/linux/x64/release/bundle

          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p rpm-src/opt/chuk-chat
          mkdir -p rpm-src/usr/bin
          mkdir -p rpm-src/usr/share/applications
          mkdir -p rpm-src/usr/share/icons/hicolor/512x512/apps

          cp -r ${BUNDLE}/* rpm-src/opt/chuk-chat/
          chmod +x rpm-src/opt/chuk-chat/chuk_chat
          ln -s /opt/chuk-chat/chuk_chat rpm-src/usr/bin/chuk-chat

          if [ -f web/icons/Icon-512.png ]; then
            cp web/icons/Icon-512.png rpm-src/usr/share/icons/hicolor/512x512/apps/chuk-chat.png
          fi

          cat > rpm-src/usr/share/applications/chuk-chat.desktop <<EOF
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Chuk Chat
          Comment=Privacy-focused AI chat with end-to-end encryption
          Exec=/opt/chuk-chat/chuk_chat
          Icon=chuk-chat
          Terminal=false
          Categories=Network;InstantMessaging;Chat;
          StartupWMClass=chuk_chat
          EOF

          tar -czf ~/rpmbuild/SOURCES/chuk-chat-${VER}.tar.gz -C rpm-src .

          cat > ~/rpmbuild/SPECS/chuk-chat.spec <<EOF
          Name:           chuk-chat
          Version:        ${VER}
          Release:        1%{?dist}
          Summary:        Privacy-focused AI chat with end-to-end encryption
          License:        BSL-1.1
          URL:            https://chuk.chat
          Source0:        chuk-chat-%{version}.tar.gz
          BuildArch:      x86_64
          Requires:       gtk3, libblkid, xz-libs

          %description
          Chuk Chat is a cross-platform chat application that uses
          open-weight AI models with AES-256-GCM end-to-end encryption.

          %prep
          %setup -q -c

          %install
          mkdir -p %{buildroot}
          cp -r * %{buildroot}/

          %files
          /opt/chuk-chat/
          /usr/bin/chuk-chat
          /usr/share/applications/chuk-chat.desktop
          /usr/share/icons/hicolor/512x512/apps/chuk-chat.png

          %post
          update-desktop-database /usr/share/applications 2>/dev/null || true
          gtk-update-icon-cache -f -t /usr/share/icons/hicolor 2>/dev/null || true

          %changelog
          * $(date '+%a %b %d %Y') Chuk Development <support@chuk.dev> - ${VER}-1
          - Release ${VER}
          EOF

          rpmbuild -bb ~/rpmbuild/SPECS/chuk-chat.spec
          cp ~/rpmbuild/RPMS/x86_64/chuk-chat-*.rpm chuk_chat-${TAG}-linux-x86_64.rpm || true

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64-packages
          path: |
            chuk_chat-*-linux-amd64.deb
            chuk_chat-*-linux-x86_64.AppImage
            chuk_chat-*-linux-x86_64.rpm
          retention-days: 1

  # ──────────────────────────────────────────────
  # Linux ARM64
  # ──────────────────────────────────────────────
  build-linux-arm64:
    name: Linux ARM64
    runs-on: warp-ubuntu-latest-arm64-4x
    needs: version-bump
    if: inputs.build_linux_arm64
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with: { ref: master }

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-14-dev libsecret-1-dev \
            dpkg-dev rpm file wget curl unzip git libfuse2

      - name: Install Flutter (manual ARM64)
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Flutter setup
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          flutter precache --linux
          flutter doctor -v

      - name: Get dependencies
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          flutter pub get

      - name: Build Linux ARM64
        run: |
          flutter build linux --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=PLATFORM_DESKTOP=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_IMAGE_GEN=false \
            --dart-define=FEATURE_VOICE_MODE=true \
            --tree-shake-icons

      - name: Detect bundle path
        id: bundle
        run: |
          # ARM64 bundle may be in different paths depending on runner
          if [ -d "build/linux/arm64/release/bundle" ]; then
            echo "path=build/linux/arm64/release/bundle" >> $GITHUB_OUTPUT
          elif [ -d "build/linux/aarch64/release/bundle" ]; then
            echo "path=build/linux/aarch64/release/bundle" >> $GITHUB_OUTPUT
          else
            # Fallback: find it
            BUNDLE=$(find build/linux -name "bundle" -type d | head -1)
            echo "path=${BUNDLE}" >> $GITHUB_OUTPUT
          fi

      - name: Create .deb package (arm64)
        run: |
          TAG=${{ needs.version-bump.outputs.tag }}
          VER=${{ needs.version-bump.outputs.version_short }}
          BUNDLE=${{ steps.bundle.outputs.path }}

          mkdir -p debian/DEBIAN
          mkdir -p debian/opt/chuk-chat
          mkdir -p debian/usr/bin
          mkdir -p debian/usr/share/applications
          mkdir -p debian/usr/share/icons/hicolor/512x512/apps

          cp -r ${BUNDLE}/* debian/opt/chuk-chat/
          chmod +x debian/opt/chuk-chat/chuk_chat
          ln -s /opt/chuk-chat/chuk_chat debian/usr/bin/chuk-chat

          if [ -f web/icons/Icon-512.png ]; then
            cp web/icons/Icon-512.png debian/usr/share/icons/hicolor/512x512/apps/chuk-chat.png
          fi

          cat > debian/usr/share/applications/chuk-chat.desktop <<EOF
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Chuk Chat
          GenericName=Chat Application
          Comment=Privacy-focused AI chat with end-to-end encryption
          Exec=/opt/chuk-chat/chuk_chat
          Icon=chuk-chat
          Terminal=false
          Categories=Network;InstantMessaging;Chat;
          StartupWMClass=chuk_chat
          Keywords=chat;ai;encrypted;privacy;
          EOF

          cat > debian/DEBIAN/control <<EOF
          Package: chuk-chat
          Version: ${VER}
          Section: net
          Priority: optional
          Architecture: arm64
          Maintainer: Chuk Development <support@chuk.dev>
          Homepage: https://chuk.chat
          Description: Privacy-focused AI chat with end-to-end encryption
           Chuk Chat is a cross-platform chat application that uses
           open-weight AI models with AES-256-GCM end-to-end encryption.
          Depends: libgtk-3-0, libblkid1, liblzma5
          EOF

          cat > debian/DEBIAN/postinst <<'SCRIPT'
          #!/bin/bash
          update-desktop-database /usr/share/applications 2>/dev/null || true
          gtk-update-icon-cache -f -t /usr/share/icons/hicolor 2>/dev/null || true
          SCRIPT
          chmod +x debian/DEBIAN/postinst

          dpkg-deb --build debian chuk_chat-${TAG}-linux-arm64.deb

      - name: Create AppImage (arm64)
        run: |
          TAG=${{ needs.version-bump.outputs.tag }}
          BUNDLE=${{ steps.bundle.outputs.path }}

          # Download aarch64 appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage || true
          if [ -f appimagetool-aarch64.AppImage ]; then
            chmod +x appimagetool-aarch64.AppImage
          fi

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps

          cp -r ${BUNDLE}/* AppDir/usr/bin/
          chmod +x AppDir/usr/bin/chuk_chat

          if [ -f web/icons/Icon-512.png ]; then
            cp web/icons/Icon-512.png AppDir/usr/share/icons/hicolor/512x512/apps/chuk-chat.png
            cp web/icons/Icon-512.png AppDir/chuk-chat.png
          fi

          cat > AppDir/chuk-chat.desktop <<EOF
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Chuk Chat
          Comment=Privacy-focused AI chat with end-to-end encryption
          Exec=chuk_chat
          Icon=chuk-chat
          Terminal=false
          Categories=Network;InstantMessaging;Chat;
          StartupWMClass=chuk_chat
          EOF
          cp AppDir/chuk-chat.desktop AppDir/usr/share/applications/

          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="${HERE}/usr/bin/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/chuk_chat" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          if [ -f appimagetool-aarch64.AppImage ]; then
            ARCH=aarch64 ./appimagetool-aarch64.AppImage AppDir chuk_chat-${TAG}-linux-aarch64.AppImage
          else
            echo "appimagetool not available for aarch64, creating tarball instead"
            tar -czf chuk_chat-${TAG}-linux-aarch64.tar.gz -C AppDir/usr/bin .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-packages
          path: |
            chuk_chat-*-linux-arm64.deb
            chuk_chat-*-linux-aarch64.AppImage
            chuk_chat-*-linux-aarch64.tar.gz
          retention-days: 1

  # ──────────────────────────────────────────────
  # Windows
  # ──────────────────────────────────────────────
  build-windows:
    name: Windows
    runs-on: warp-windows-latest-x64-4x
    needs: version-bump
    if: inputs.build_windows
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with: { ref: master }

      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }

      - run: flutter pub get

      - name: Build Windows
        run: |
          flutter build windows --release `
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} `
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} `
            --dart-define=FEATURE_PROJECTS=true `
            --dart-define=FEATURE_IMAGE_GEN=false `
            --dart-define=FEATURE_VOICE_MODE=true `
            --tree-shake-icons

      - name: Create portable ZIP
        run: |
          cd build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath ../../../../../chuk_chat-${{ needs.version-bump.outputs.tag }}-windows-x64-portable.zip

      - name: Create Inno Setup installer
        run: |
          $TAG = "${{ needs.version-bump.outputs.tag }}"
          $VER = "${{ needs.version-bump.outputs.version_short }}"

          # Install Inno Setup via Chocolatey (pre-installed on GitHub runners)
          choco install innosetup -y --no-progress

          # Create Inno Setup script
          @"
          [Setup]
          AppId={{B8F3C2A1-7D4E-4F5B-9A1C-3E8D2F6A7B9C}
          AppName=Chuk Chat
          AppVersion=$VER
          AppPublisher=Chuk Development
          AppPublisherURL=https://chuk.chat
          AppSupportURL=https://chuk.chat
          DefaultDirName={autopf}\Chuk Chat
          DefaultGroupName=Chuk Chat
          DisableProgramGroupPage=yes
          OutputDir=.
          OutputBaseFilename=chuk_chat-$TAG-windows-x64-setup
          Compression=lzma2/ultra64
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          UninstallDisplayIcon={app}\chuk_chat.exe
          SetupIconFile=windows\runner\resources\app_icon.ico
          PrivilegesRequired=lowest

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"
          Name: "german"; MessagesFile: "compiler:Languages\German.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\Chuk Chat"; Filename: "{app}\chuk_chat.exe"
          Name: "{group}\{cm:UninstallProgram,Chuk Chat}"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\Chuk Chat"; Filename: "{app}\chuk_chat.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\chuk_chat.exe"; Description: "{cm:LaunchProgram,Chuk Chat}"; Flags: nowait postinstall skipifsilent
          "@ | Out-File -Encoding UTF8 chuk_chat.iss

          # Build installer (choco installs to Program Files)
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" chuk_chat.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            chuk_chat-*-windows-x64-portable.zip
            chuk_chat-*-windows-x64-setup.exe
          retention-days: 1

  # ──────────────────────────────────────────────
  # macOS
  # ──────────────────────────────────────────────
  build-macos:
    name: macOS
    runs-on: warp-macos-15-arm64-6x
    needs: version-bump
    if: inputs.build_macos
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with: { ref: master }

      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }

      - run: flutter pub get

      - name: Build macOS
        run: |
          flutter build macos --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_IMAGE_GEN=false \
            --dart-define=FEATURE_VOICE_MODE=true \
            --tree-shake-icons

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Chuk Chat" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            chuk_chat-${{ needs.version-bump.outputs.tag }}-macos.dmg \
            build/macos/Build/Products/Release/chuk_chat.app \
            || (cd build/macos/Build/Products/Release && \
                zip -r ../../../../../chuk_chat-${{ needs.version-bump.outputs.tag }}-macos.zip chuk_chat.app)

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: chuk_chat-${{ needs.version-bump.outputs.tag }}-macos.*
          retention-days: 1

  # ──────────────────────────────────────────────
  # iOS
  # ──────────────────────────────────────────────
  build-ios:
    name: iOS
    runs-on: warp-macos-15-arm64-6x
    needs: version-bump
    if: inputs.build_ios
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with: { ref: master }

      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }

      - run: flutter pub get

      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=PLATFORM_MOBILE=true \
            --dart-define=FEATURE_PROJECTS=false \
            --dart-define=FEATURE_IMAGE_GEN=false \
            --dart-define=FEATURE_VOICE_MODE=false

      - name: Create archive
        run: |
          cd build/ios/iphoneos
          zip -r ../../../chuk_chat-${{ needs.version-bump.outputs.tag }}-ios.zip Runner.app

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: chuk_chat-${{ needs.version-bump.outputs.tag }}-ios.zip
          retention-days: 1

  # ──────────────────────────────────────────────
  # Create GitHub Release
  # ──────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: warp-ubuntu-latest-x64-2x
    needs: [version-bump, build-android, build-linux-x64, build-linux-arm64, build-windows, build-macos, build-ios]
    if: |
      always() &&
      needs.version-bump.result == 'success' &&
      (needs.build-android.result == 'success' || needs.build-android.result == 'skipped') &&
      (needs.build-linux-x64.result == 'success' || needs.build-linux-x64.result == 'skipped') &&
      (needs.build-linux-arm64.result != 'cancelled') &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') &&
      (needs.build-ios.result == 'success' || needs.build-ios.result == 'skipped')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version-bump.outputs.tag }}
          name: Chuk Chat ${{ needs.version-bump.outputs.tag }}
          body: |
            ## Downloads

            **Android** (choose your architecture):
            - **ARM64** — for modern phones (recommended)
            - **ARM32** — for older phones
            - **x64** — for emulators / x86 devices

            **Linux x86_64:**
            - **.deb** — Debian/Ubuntu: `sudo dpkg -i chuk_chat-*-linux-amd64.deb`
            - **.AppImage** — Universal: `chmod +x *.AppImage && ./chuk_chat-*-linux-x86_64.AppImage`
            - **.rpm** — Fedora/RHEL: `sudo rpm -i chuk_chat-*-linux-x86_64.rpm`

            **Linux ARM64** (Raspberry Pi, Asahi Linux, etc.):
            - **.deb** — Debian/Ubuntu: `sudo dpkg -i chuk_chat-*-linux-arm64.deb`
            - **.AppImage** — Universal (if available)

            **Windows:**
            - **Setup.exe** — Installer with Start Menu shortcut (recommended)
            - **Portable ZIP** — extract and run, no installation needed

            **macOS:**
            - DMG or ZIP — drag to Applications

          draft: false
          prerelease: false
          files: |
            artifacts/android-apks/*
            artifacts/linux-x64-packages/*
            artifacts/linux-arm64-packages/*
            artifacts/windows-build/*
            artifacts/macos-build/*
            artifacts/ios-build/*

  # ──────────────────────────────────────────────
  # Mirror to Public Releases Repo
  # ──────────────────────────────────────────────
  mirror-to-public:
    name: Mirror to Public Repo
    runs-on: warp-ubuntu-latest-x64-2x
    needs: [version-bump, create-release]
    if: |
      always() &&
      needs.create-release.result == 'success'

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare stable-named assets
        run: |
          TAG=${{ needs.version-bump.outputs.tag }}
          mkdir -p release-assets

          # Android (rename arm64→armv8, arm32→armv7 for public naming)
          for f in artifacts/android-apks/chuk_chat-*-android-arm64.apk; do
            [ -f "$f" ] && cp "$f" release-assets/chuk_chat-android-armv8.apk
          done
          for f in artifacts/android-apks/chuk_chat-*-android-arm32.apk; do
            [ -f "$f" ] && cp "$f" release-assets/chuk_chat-android-armv7.apk
          done
          for f in artifacts/android-apks/chuk_chat-*-android-x64.apk; do
            [ -f "$f" ] && cp "$f" release-assets/chuk_chat-android-x64.apk
          done

          # Linux x64
          for f in artifacts/linux-x64-packages/chuk_chat-*-linux-amd64.deb; do
            [ -f "$f" ] && cp "$f" release-assets/chuk_chat-linux-amd64.deb
          done
          for f in artifacts/linux-x64-packages/chuk_chat-*-linux-x86_64.AppImage; do
            [ -f "$f" ] && cp "$f" release-assets/chuk_chat-linux-x86_64.AppImage
          done
          for f in artifacts/linux-x64-packages/chuk_chat-*-linux-x86_64.rpm; do
            [ -f "$f" ] && cp "$f" release-assets/chuk_chat-linux-x86_64.rpm
          done

          # Linux ARM64
          for f in artifacts/linux-arm64-packages/chuk_chat-*-linux-arm64.deb; do
            [ -f "$f" ] && cp "$f" release-assets/chuk_chat-linux-arm64.deb
          done
          for f in artifacts/linux-arm64-packages/chuk_chat-*-linux-aarch64.AppImage; do
            [ -f "$f" ] && cp "$f" release-assets/chuk_chat-linux-aarch64.AppImage
          done

          # Windows
          for f in artifacts/windows-build/chuk_chat-*-windows-x64-setup.exe; do
            [ -f "$f" ] && cp "$f" release-assets/chuk_chat-windows-x64-setup.exe
          done
          for f in artifacts/windows-build/chuk_chat-*-windows-x64-portable.zip; do
            [ -f "$f" ] && cp "$f" release-assets/chuk_chat-windows-x64-portable.zip
          done

          # macOS
          for f in artifacts/macos-build/chuk_chat-*-macos.dmg; do
            [ -f "$f" ] && cp "$f" release-assets/chuk_chat-macos.dmg
          done
          for f in artifacts/macos-build/chuk_chat-*-macos.zip; do
            [ -f "$f" ] && cp "$f" release-assets/chuk_chat-macos.zip
          done

          # iOS
          for f in artifacts/ios-build/chuk_chat-*-ios.zip; do
            [ -f "$f" ] && cp "$f" release-assets/chuk_chat-ios.zip
          done

          echo "=== Stable-named assets for public repo ==="
          ls -lh release-assets/

      - name: Create release on public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
        run: |
          TAG=${{ needs.version-bump.outputs.tag }}

          # Build asset list (only include files that exist)
          ASSETS=""
          for f in release-assets/*; do
            [ -f "$f" ] && ASSETS="$ASSETS $f"
          done

          if [ -z "$ASSETS" ]; then
            echo "No assets to upload!"
            exit 1
          fi

          gh release create "${TAG}" $ASSETS \
            --repo chuk-development/chuk_chat_releases \
            --title "Chuk Chat ${TAG}" \
            --notes "$(cat <<'NOTES'
          ## Downloads

          **Android** (choose your architecture):
          - **ARMv8** — for modern phones (recommended)
          - **ARMv7** — for older phones
          - **x64** — for emulators / x86 devices

          **Linux x86_64:**
          - **.deb** — Debian/Ubuntu: `sudo dpkg -i chuk_chat-linux-amd64.deb`
          - **.AppImage** — Universal: `chmod +x chuk_chat-linux-x86_64.AppImage && ./chuk_chat-linux-x86_64.AppImage`
          - **.rpm** — Fedora/RHEL: `sudo rpm -i chuk_chat-linux-x86_64.rpm`

          **Windows:**
          - **Setup.exe** — Installer with Start Menu shortcut (recommended)
          - **Portable ZIP** — Extract and run, no installation needed

          **macOS:**
          - DMG or ZIP — drag to Applications
          NOTES
          )"
