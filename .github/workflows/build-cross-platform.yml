name: Cross-Platform Build & Release

on:
  workflow_dispatch:
    inputs:
      enable_all_features:
        description: 'Build with all features enabled'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          # Read current version from pubspec.yaml
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "Current version: $CURRENT_VERSION"

          # Split into version and build number (e.g., 1.0.6+4004)
          VERSION_PART=$(echo $CURRENT_VERSION | cut -d'+' -f1)
          BUILD_NUMBER=$(echo $CURRENT_VERSION | cut -d'+' -f2)

          # Split version into major.minor.patch
          MAJOR=$(echo $VERSION_PART | cut -d'.' -f1)
          MINOR=$(echo $VERSION_PART | cut -d'.' -f2)
          PATCH=$(echo $VERSION_PART | cut -d'.' -f3)

          # Increment patch and build number
          NEW_PATCH=$((PATCH + 1))
          NEW_BUILD=$((BUILD_NUMBER + 1))

          # Create new version string
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH+$NEW_BUILD"
          echo "New version: $NEW_VERSION"

          # Update pubspec.yaml
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml

          # Set outputs
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$MAJOR.$MINOR.$NEW_PATCH" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: version-bump
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create key.properties (if secrets available)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build Android APK (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build apk \
            --dart-define=PLATFORM_MOBILE=true \
            --dart-define=FEATURE_MEDIA_MANAGER=true \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --tree-shake-icons \
            --target-platform android-arm64 \
            --release

      - name: Build Android APK (basic)
        if: ${{ !inputs.enable_all_features }}
        run: |
          flutter build apk \
            --dart-define=PLATFORM_MOBILE=true \
            --tree-shake-icons \
            --target-platform android-arm64 \
            --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/chuk_chat-${{ needs.version-bump.outputs.tag }}-android.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/chuk_chat-${{ needs.version-bump.outputs.tag }}-android.apk
          retention-days: 30

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: version-bump
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build linux \
            --dart-define=FEATURE_MEDIA_MANAGER=true \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --release

      - name: Build Linux (basic)
        if: ${{ !inputs.enable_all_features }}
        run: flutter build linux --release

      - name: Create Linux archive
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../chuk_chat-${{ needs.version-bump.outputs.tag }}-linux-x64.tar.gz *

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: chuk_chat-${{ needs.version-bump.outputs.tag }}-linux-x64.tar.gz
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: version-bump
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build windows `
            --dart-define=FEATURE_MEDIA_MANAGER=true `
            --dart-define=FEATURE_IMAGE_GEN=true `
            --dart-define=FEATURE_PROJECTS=true `
            --dart-define=FEATURE_VOICE_MODE=true `
            --release

      - name: Build Windows (basic)
        if: ${{ !inputs.enable_all_features }}
        run: flutter build windows --release

      - name: Create Windows archive
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath chuk_chat-${{ needs.version-bump.outputs.tag }}-windows-x64.zip

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: chuk_chat-${{ needs.version-bump.outputs.tag }}-windows-x64.zip
          retention-days: 30

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: version-bump
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build macos \
            --dart-define=FEATURE_MEDIA_MANAGER=true \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --release

      - name: Build macOS (basic)
        if: ${{ !inputs.enable_all_features }}
        run: flutter build macos --release

      - name: Create macOS archive
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../chuk_chat-${{ needs.version-bump.outputs.tag }}-macos.zip chuk_chat.app

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: chuk_chat-${{ needs.version-bump.outputs.tag }}-macos.zip
          retention-days: 30

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: version-bump
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build ios \
            --dart-define=PLATFORM_MOBILE=true \
            --dart-define=FEATURE_MEDIA_MANAGER=true \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --release \
            --no-codesign

      - name: Build iOS (basic)
        if: ${{ !inputs.enable_all_features }}
        run: |
          flutter build ios \
            --dart-define=PLATFORM_MOBILE=true \
            --release \
            --no-codesign

      - name: Create iOS archive
        run: |
          cd build/ios/iphoneos
          zip -r ../../../chuk_chat-${{ needs.version-bump.outputs.tag }}-ios.zip Runner.app

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: chuk_chat-${{ needs.version-bump.outputs.tag }}-ios.zip
          retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version-bump, build-android, build-linux, build-windows, build-macos, build-ios]
    if: success()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version-bump.outputs.tag }}
          name: Release ${{ needs.version-bump.outputs.tag }}
          body: |
            ## 🚀 chuk_chat ${{ needs.version-bump.outputs.tag }}

            Cross-platform build with version ${{ needs.version-bump.outputs.version }}

            ### 📦 Downloads

            - **Android**: APK for ARM64 devices
            - **Linux**: x64 archive (tar.gz)
            - **Windows**: x64 archive (zip)
            - **macOS**: Universal binary (zip)
            - **iOS**: Unsigned build (zip) - requires manual signing

            ### ✨ Features

            ${{ inputs.enable_all_features && '- ✅ All features enabled (Media Manager, Image Gen, Projects, Voice Mode)' || '- ⚡ Basic build (core features only)' }}

            ### 📝 Installation

            **Android**: Install the APK directly on your device

            **Linux**: Extract and run
            ```bash
            tar -xzf chuk_chat-${{ needs.version-bump.outputs.tag }}-linux-x64.tar.gz
            ./chuk_chat
            ```

            **Windows**: Extract and run `chuk_chat.exe`

            **macOS**: Extract and move `chuk_chat.app` to Applications

            **iOS**: Requires manual code signing with Xcode

            ---
            🤖 Built with [GitHub Actions](https://github.com/features/actions)
          draft: false
          prerelease: false
          files: |
            artifacts/android-apk/*
            artifacts/linux-build/*
            artifacts/windows-build/*
            artifacts/macos-build/*
            artifacts/ios-build/*

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [version-bump, build-android, build-linux, build-windows, build-macos, build-ios, create-release]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## 🚀 Cross-Platform Build & Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ needs.version-bump.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: ${{ needs.version-bump.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 Android  | ${{ needs.build-android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐧 Linux    | ${{ needs.build-linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🪟 Windows  | ${{ needs.build-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🍎 macOS    | ${{ needs.build-macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 iOS      | ${{ needs.build-ios.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎉 Release  | ${{ needs.create-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.create-release.result }}" == "success" ]; then
            echo "✅ **Release created successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "View release: [Release ${{ needs.version-bump.outputs.tag }}](https://github.com/${{ github.repository }}/releases/tag/${{ needs.version-bump.outputs.tag }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Release creation failed. Check logs above." >> $GITHUB_STEP_SUMMARY
          fi
