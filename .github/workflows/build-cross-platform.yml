name: Cross-Platform Build & Release

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: '📱 Build Android (Split APKs + Universal)'
        required: false
        default: true
        type: boolean
      build_linux:
        description: '🐧 Build Linux (.deb, AppImage, .rpm)'
        required: false
        default: true
        type: boolean
      build_windows:
        description: '🪟 Build Windows (MSIX)'
        required: false
        default: true
        type: boolean
      build_macos:
        description: '🍎 Build macOS (.dmg)'
        required: false
        default: true
        type: boolean
      build_ios:
        description: '📱 Build iOS (unsigned .zip)'
        required: false
        default: false
        type: boolean
      enable_all_features:
        description: '✨ Build with all features enabled'
        required: false
        default: true
        type: boolean
      enable_signing:
        description: '🔐 Enable Android signing (requires secrets)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      build_android: ${{ inputs.build_android }}
      build_linux: ${{ inputs.build_linux }}
      build_windows: ${{ inputs.build_windows }}
      build_macos: ${{ inputs.build_macos }}
      build_ios: ${{ inputs.build_ios }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Display selected platforms
        run: |
          echo "Selected platforms:"
          echo "  Android: ${{ inputs.build_android }}"
          echo "  Linux: ${{ inputs.build_linux }}"
          echo "  Windows: ${{ inputs.build_windows }}"
          echo "  macOS: ${{ inputs.build_macos }}"
          echo "  iOS: ${{ inputs.build_ios }}"
          echo ""
          echo "Options:"
          echo "  All features: ${{ inputs.enable_all_features }}"
          echo "  Android signing: ${{ inputs.enable_signing }}"

      - name: Bump version
        id: bump
        run: |
          # Read current version from pubspec.yaml
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "Current version: $CURRENT_VERSION"

          # Split into version and build number (e.g., 1.0.6+4004)
          VERSION_PART=$(echo $CURRENT_VERSION | cut -d'+' -f1)
          BUILD_NUMBER=$(echo $CURRENT_VERSION | cut -d'+' -f2)

          # Split version into major.minor.patch
          MAJOR=$(echo $VERSION_PART | cut -d'.' -f1)
          MINOR=$(echo $VERSION_PART | cut -d'.' -f2)
          PATCH=$(echo $VERSION_PART | cut -d'.' -f3)

          # Increment patch and build number
          NEW_PATCH=$((PATCH + 1))
          NEW_BUILD=$((BUILD_NUMBER + 1))

          # Create new version string
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH+$NEW_BUILD"
          echo "New version: $NEW_VERSION"

          # Update pubspec.yaml
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml

          # Set outputs
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$MAJOR.$MINOR.$NEW_PATCH" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push

  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    needs: version-bump
    if: needs.version-bump.outputs.build_android == 'true'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create key.properties (if signing enabled)
        if: ${{ inputs.enable_signing }}
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Decode keystore
        if: ${{ inputs.enable_signing }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build Split APKs (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build apk \
            --dart-define=PLATFORM_MOBILE=true \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --tree-shake-icons \
            --split-per-abi \
            --release

      - name: Build Split APKs (basic)
        if: ${{ !inputs.enable_all_features }}
        run: |
          flutter build apk \
            --dart-define=PLATFORM_MOBILE=true \
            --tree-shake-icons \
            --split-per-abi \
            --release

      - name: Build Universal APK (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build apk \
            --dart-define=PLATFORM_MOBILE=true \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --tree-shake-icons \
            --release

      - name: Build Universal APK (basic)
        if: ${{ !inputs.enable_all_features }}
        run: |
          flutter build apk \
            --dart-define=PLATFORM_MOBILE=true \
            --tree-shake-icons \
            --release

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          # Rename split APKs
          mv app-arm64-v8a-release.apk chuk_chat-${{ needs.version-bump.outputs.tag }}-android-arm64.apk || true
          mv app-armeabi-v7a-release.apk chuk_chat-${{ needs.version-bump.outputs.tag }}-android-arm32.apk || true
          mv app-x86_64-release.apk chuk_chat-${{ needs.version-bump.outputs.tag }}-android-x64.apk || true
          # Rename universal APK
          mv app-release.apk chuk_chat-${{ needs.version-bump.outputs.tag }}-android-universal.apk || true

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/chuk_chat-*.apk
          retention-days: 30

  build-linux:
    name: Build Linux (.deb, AppImage, RPM)
    runs-on: ubuntu-latest
    needs: version-bump
    if: needs.version-bump.outputs.build_linux == 'true'
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev dpkg-dev rpm file wget fuse libfuse2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build linux \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --release

      - name: Build Linux (basic)
        if: ${{ !inputs.enable_all_features }}
        run: flutter build linux --release

      - name: Create .deb package
        run: |
          VERSION="${{ needs.version-bump.outputs.version }}"
          VERSION_NO_BUILD=$(echo $VERSION | cut -d'+' -f1)

          # Create package structure
          mkdir -p debian/DEBIAN
          mkdir -p debian/usr/bin
          mkdir -p debian/usr/share/applications
          mkdir -p debian/usr/share/icons/hicolor/512x512/apps

          # Copy application files
          cp -r build/linux/x64/release/bundle/* debian/usr/bin/

          # Create control file
          cat > debian/DEBIAN/control <<EOF
          Package: chuk-chat
          Version: $VERSION_NO_BUILD
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: chuk_chat <noreply@chuk.chat>
          Description: Cross-platform encrypted chat application
           chuk_chat is a cross-platform chat application with E2E encryption,
           Supabase backend, and AI chat capabilities.
          EOF

          # Create desktop entry
          cat > debian/usr/share/applications/chuk-chat.desktop <<EOF
          [Desktop Entry]
          Name=chuk_chat
          Comment=Encrypted Chat Application
          Exec=/usr/bin/chuk_chat
          Icon=chuk-chat
          Terminal=false
          Type=Application
          Categories=Network;InstantMessaging;
          EOF

          # Build .deb
          dpkg-deb --build debian chuk_chat-${{ needs.version-bump.outputs.tag }}-linux-amd64.deb

      - name: Create AppImage
        run: |
          VERSION="${{ needs.version-bump.outputs.version }}"
          VERSION_NO_BUILD=$(echo $VERSION | cut -d'+' -f1)

          # Download linuxdeploy and appimagetool
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps

          # Copy application files
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          # Create desktop entry
          cat > AppDir/usr/share/applications/chuk-chat.desktop <<EOF
          [Desktop Entry]
          Name=chuk_chat
          Comment=Encrypted Chat Application
          Exec=chuk_chat
          Icon=chuk-chat
          Terminal=false
          Type=Application
          Categories=Network;InstantMessaging;
          EOF

          # Create a simple icon (if not exists)
          touch AppDir/usr/share/icons/hicolor/512x512/apps/chuk-chat.png

          # Build AppImage
          ARCH=x86_64 ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage || true

          # Rename AppImage if it was created
          if ls chuk_chat-*.AppImage 1> /dev/null 2>&1; then
            mv chuk_chat-*.AppImage chuk_chat-${{ needs.version-bump.outputs.tag }}-linux-x86_64.AppImage
          else
            # Fallback: create a simple archive
            cd AppDir && tar -czf ../chuk_chat-${{ needs.version-bump.outputs.tag }}-linux-x86_64.AppImage.tar.gz * && cd ..
          fi

      - name: Create RPM package
        run: |
          VERSION="${{ needs.version-bump.outputs.version }}"
          VERSION_NO_BUILD=$(echo $VERSION | cut -d'+' -f1)

          # Create RPM build structure
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p rpm-package/usr/bin
          mkdir -p rpm-package/usr/share/applications

          # Copy application files
          cp -r build/linux/x64/release/bundle/* rpm-package/usr/bin/

          # Create desktop entry
          cat > rpm-package/usr/share/applications/chuk-chat.desktop <<EOF
          [Desktop Entry]
          Name=chuk_chat
          Comment=Encrypted Chat Application
          Exec=/usr/bin/chuk_chat
          Icon=chuk-chat
          Terminal=false
          Type=Application
          Categories=Network;InstantMessaging;
          EOF

          # Create tarball
          tar -czf ~/rpmbuild/SOURCES/chuk-chat-$VERSION_NO_BUILD.tar.gz -C rpm-package .

          # Create spec file
          cat > ~/rpmbuild/SPECS/chuk-chat.spec <<EOF
          Name:           chuk-chat
          Version:        $VERSION_NO_BUILD
          Release:        1%{?dist}
          Summary:        Cross-platform encrypted chat application

          License:        Proprietary
          URL:            https://github.com/chuk-development/chuk_chat
          Source0:        chuk-chat-%{version}.tar.gz

          BuildArch:      x86_64
          Requires:       gtk3

          %description
          chuk_chat is a cross-platform chat application with E2E encryption,
          Supabase backend, and AI chat capabilities.

          %prep
          %setup -q -c

          %install
          mkdir -p %{buildroot}
          cp -r * %{buildroot}/

          %files
          /usr/bin/*
          /usr/share/applications/chuk-chat.desktop

          %changelog
          * $(date "+%a %b %d %Y") GitHub Actions <noreply@chuk.chat> - $VERSION_NO_BUILD-1
          - Automated build
          EOF

          # Build RPM
          rpmbuild -bb ~/rpmbuild/SPECS/chuk-chat.spec

          # Copy RPM to workspace
          cp ~/rpmbuild/RPMS/x86_64/chuk-chat-*.rpm chuk_chat-${{ needs.version-bump.outputs.tag }}-linux-x86_64.rpm || true

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            chuk_chat-${{ needs.version-bump.outputs.tag }}-linux-amd64.deb
            chuk_chat-${{ needs.version-bump.outputs.tag }}-linux-x86_64.AppImage*
            chuk_chat-${{ needs.version-bump.outputs.tag }}-linux-x86_64.rpm
          retention-days: 30

  build-windows:
    name: Build Windows MSIX
    runs-on: windows-latest
    needs: version-bump
    if: needs.version-bump.outputs.build_windows == 'true'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Add msix to dependencies
        run: |
          flutter pub add msix --dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build windows `
            --dart-define=FEATURE_IMAGE_GEN=true `
            --dart-define=FEATURE_PROJECTS=true `
            --dart-define=FEATURE_VOICE_MODE=true `
            --release

      - name: Build Windows (basic)
        if: ${{ !inputs.enable_all_features }}
        run: flutter build windows --release

      - name: Create Self-Signed Certificate
        run: |
          # Create a self-signed certificate for code signing
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=chuk Development" `
            -KeyUsage DigitalSignature `
            -FriendlyName "chuk_chat Certificate" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")

          # Export certificate
          $pwd = ConvertTo-SecureString -String "temppass123" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath chuk_cert.pfx -Password $pwd

          # Get certificate thumbprint
          $thumbprint = $cert.Thumbprint
          echo "CERT_THUMBPRINT=$thumbprint" >> $env:GITHUB_ENV

      - name: Create MSIX package
        run: |
          # Create msix config
          $version = "${{ needs.version-bump.outputs.version }}" -replace '\+.*',''

          flutter pub run msix:create `
            --display-name "chuk_chat" `
            --publisher-display-name "chuk_chat" `
            --identity-name "chuk.chat" `
            --publisher "CN=chuk Development" `
            --version "$version.0" `
            --capabilities "internetClient" `
            --store false `
            --certificate-path "chuk_cert.pfx" `
            --certificate-password "temppass123"

      - name: Rename MSIX
        run: |
          Move-Item -Path build\windows\x64\runner\Release\chuk_chat.msix -Destination chuk_chat-${{ needs.version-bump.outputs.tag }}-windows-x64.msix

      - name: Upload Windows MSIX
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: |
            chuk_chat-${{ needs.version-bump.outputs.tag }}-windows-x64.msix
            chuk_cert.pfx
          retention-days: 30

  build-macos:
    name: Build macOS .dmg
    runs-on: macos-latest
    needs: version-bump
    if: needs.version-bump.outputs.build_macos == 'true'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build macos \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --release

      - name: Build macOS (basic)
        if: ${{ !inputs.enable_all_features }}
        run: flutter build macos --release

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create .dmg
        run: |
          create-dmg \
            --volname "chuk_chat Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            chuk_chat-${{ needs.version-bump.outputs.tag }}-macos.dmg \
            build/macos/Build/Products/Release/chuk_chat.app \
            || cp -r build/macos/Build/Products/Release/chuk_chat.app chuk_chat.app && \
               hdiutil create -volname "chuk_chat" -srcfolder chuk_chat.app -ov -format UDZO chuk_chat-${{ needs.version-bump.outputs.tag }}-macos.dmg

      - name: Upload macOS .dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: chuk_chat-${{ needs.version-bump.outputs.tag }}-macos.dmg
          retention-days: 30

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: version-bump
    if: needs.version-bump.outputs.build_ios == 'true'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build ios \
            --dart-define=PLATFORM_MOBILE=true \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --release \
            --no-codesign

      - name: Build iOS (basic)
        if: ${{ !inputs.enable_all_features }}
        run: |
          flutter build ios \
            --dart-define=PLATFORM_MOBILE=true \
            --release \
            --no-codesign

      - name: Create iOS archive
        run: |
          cd build/ios/iphoneos
          zip -r ../../../chuk_chat-${{ needs.version-bump.outputs.tag }}-ios.zip Runner.app

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: chuk_chat-${{ needs.version-bump.outputs.tag }}-ios.zip
          retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version-bump, build-android, build-linux, build-windows, build-macos]
    if: |
      always() &&
      (needs.build-android.result == 'success' || needs.build-android.result == 'skipped') &&
      (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version-bump.outputs.tag }}
          name: Release ${{ needs.version-bump.outputs.tag }}
          body: |
            ## 🚀 chuk_chat ${{ needs.version-bump.outputs.tag }}

            Cross-platform build with version ${{ needs.version-bump.outputs.version }}

            ### 📦 Downloads

            **Android APKs** (choose one):
            - **Universal APK**: Works on all Android devices (larger size)
            - **ARM64 APK**: For modern Android devices (recommended, smaller)
            - **ARM32 APK**: For older Android devices
            - **x64 APK**: For Android emulators and x86 devices

            **Desktop**:
            - **Windows**: MSIX installer (double-click to install)
            - **Linux**: Choose your package format:
              - **.deb** for Debian/Ubuntu (`sudo dpkg -i`)
              - **AppImage** for universal Linux (just run it)
              - **.rpm** for Fedora/RHEL/openSUSE (`sudo rpm -i`)
            - **macOS**: .dmg disk image (drag to Applications folder)

            ### ✨ Features

            ${{ inputs.enable_all_features && '- ✅ All features enabled (Media Manager, Image Gen, Projects, Voice Mode)' || '- ⚡ Basic build (core features only)' }}

            ### 📝 Installation

            **Android**:
            - Download the Universal APK (easiest) or the APK matching your device architecture
            - Enable "Install from Unknown Sources" in your Android settings
            - Install the APK

            **Windows**:
            - Download the .msix file
            - Double-click to install
            - Or use: `Add-AppxPackage chuk_chat-*.msix` in PowerShell

            **Linux**:

            *Debian/Ubuntu (.deb):*
            ```bash
            sudo dpkg -i chuk_chat-${{ needs.version-bump.outputs.tag }}-linux-amd64.deb
            sudo apt-get install -f  # Fix dependencies if needed
            chuk-chat
            ```

            *AppImage (universal):*
            ```bash
            chmod +x chuk_chat-${{ needs.version-bump.outputs.tag }}-linux-x86_64.AppImage
            ./chuk_chat-${{ needs.version-bump.outputs.tag }}-linux-x86_64.AppImage
            ```

            *Fedora/RHEL (.rpm):*
            ```bash
            sudo rpm -i chuk_chat-${{ needs.version-bump.outputs.tag }}-linux-x86_64.rpm
            # Or: sudo dnf install chuk_chat-*.rpm
            chuk-chat
            ```

            **macOS**:
            - Download the .dmg file
            - Open the .dmg
            - Drag chuk_chat.app to Applications folder
            - First launch: Right-click → Open (bypass Gatekeeper)

            ### 🔐 Signing Status

            ${{ inputs.enable_signing && '- ✅ Android APKs are signed' || '- ⚠️ Android APKs are unsigned (development build)' }}
            - Windows MSIX is self-signed
            - macOS .dmg is unsigned (requires "Open" via right-click)
            - Linux .deb is unsigned

            ---
            🤖 Built with [GitHub Actions](https://github.com/features/actions)
          draft: false
          prerelease: false
          files: |
            artifacts/android-apks/*
            artifacts/linux-packages/*
            artifacts/windows-msix/*
            artifacts/macos-dmg/*
            artifacts/ios-build/*

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [version-bump, build-android, build-linux, build-windows, build-macos, build-ios, create-release]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## 🚀 Cross-Platform Build & Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ needs.version-bump.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: ${{ needs.version-bump.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          PLATFORMS=""
          ${{ inputs.build_android }} && PLATFORMS="${PLATFORMS}Android "
          ${{ inputs.build_linux }} && PLATFORMS="${PLATFORMS}Linux "
          ${{ inputs.build_windows }} && PLATFORMS="${PLATFORMS}Windows "
          ${{ inputs.build_macos }} && PLATFORMS="${PLATFORMS}macOS "
          ${{ inputs.build_ios }} && PLATFORMS="${PLATFORMS}iOS "
          echo "**Platforms**: ${PLATFORMS:-None}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status | Output |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 Android  | ${{ needs.build-android.result }} | Split APKs (arm64, arm32, x64) + Universal APK |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐧 Linux    | ${{ needs.build-linux.result }} | .deb, AppImage, .rpm |" >> $GITHUB_STEP_SUMMARY
          echo "| 🪟 Windows  | ${{ needs.build-windows.result }} | MSIX installer |" >> $GITHUB_STEP_SUMMARY
          echo "| 🍎 macOS    | ${{ needs.build-macos.result }} | .dmg disk image |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 iOS      | ${{ needs.build-ios.result }} | .zip (disabled by default) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎉 Release  | ${{ needs.create-release.result }} | GitHub Release |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.create-release.result }}" == "success" ]; then
            echo "✅ **Release created successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "View release: [Release ${{ needs.version-bump.outputs.tag }}](https://github.com/${{ github.repository }}/releases/tag/${{ needs.version-bump.outputs.tag }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Release status: ${{ needs.create-release.result }}" >> $GITHUB_STEP_SUMMARY
          fi
