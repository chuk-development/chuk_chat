name: Cross-Platform Build

on:
  workflow_dispatch:
    inputs:
      enable_all_features:
        description: 'Build with all features enabled'
        required: false
        default: 'true'
        type: boolean

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create key.properties (if secrets available)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build Android APK (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build apk \
            --dart-define=PLATFORM_MOBILE=true \
            --dart-define=FEATURE_MEDIA_MANAGER=true \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --tree-shake-icons \
            --target-platform android-arm64 \
            --release

      - name: Build Android APK (basic)
        if: ${{ !inputs.enable_all_features }}
        run: |
          flutter build apk \
            --dart-define=PLATFORM_MOBILE=true \
            --tree-shake-icons \
            --target-platform android-arm64 \
            --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build linux \
            --dart-define=FEATURE_MEDIA_MANAGER=true \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --release

      - name: Build Linux (basic)
        if: ${{ !inputs.enable_all_features }}
        run: flutter build linux --release

      - name: Create Linux archive
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../chuk_chat-linux-x64.tar.gz *

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: chuk_chat-linux-x64.tar.gz
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build windows `
            --dart-define=FEATURE_MEDIA_MANAGER=true `
            --dart-define=FEATURE_IMAGE_GEN=true `
            --dart-define=FEATURE_PROJECTS=true `
            --dart-define=FEATURE_VOICE_MODE=true `
            --release

      - name: Build Windows (basic)
        if: ${{ !inputs.enable_all_features }}
        run: flutter build windows --release

      - name: Create Windows archive
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath chuk_chat-windows-x64.zip

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: chuk_chat-windows-x64.zip
          retention-days: 30

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build macos \
            --dart-define=FEATURE_MEDIA_MANAGER=true \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --release

      - name: Build macOS (basic)
        if: ${{ !inputs.enable_all_features }}
        run: flutter build macos --release

      - name: Create macOS archive
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../chuk_chat-macos.zip chuk_chat.app

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: chuk_chat-macos.zip
          retention-days: 30

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (with all features)
        if: ${{ inputs.enable_all_features }}
        run: |
          flutter build ios \
            --dart-define=PLATFORM_MOBILE=true \
            --dart-define=FEATURE_MEDIA_MANAGER=true \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --release \
            --no-codesign

      - name: Build iOS (basic)
        if: ${{ !inputs.enable_all_features }}
        run: |
          flutter build ios \
            --dart-define=PLATFORM_MOBILE=true \
            --release \
            --no-codesign

      - name: Create iOS archive
        run: |
          cd build/ios/iphoneos
          zip -r ../../../chuk_chat-ios.zip Runner.app

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: chuk_chat-ios.zip
          retention-days: 30

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-android, build-linux, build-windows, build-macos, build-ios]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## Cross-Platform Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Android  | ${{ needs.build-android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux    | ${{ needs.build-linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | ${{ needs.build-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS    | ${{ needs.build-macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS      | ${{ needs.build-ios.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All artifacts are available in the Actions tab for 30 days." >> $GITHUB_STEP_SUMMARY
