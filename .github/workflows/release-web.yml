name: Release - Web

on:
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: '3.27.3'

jobs:
  build-web:
    name: Build and Deploy Web
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web release
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_MEDIA_MANAGER=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --tree-shake-icons \
            --web-renderer canvaskit \
            --base-href "/"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Web archive
        run: |
          cd build/web
          zip -r ../../chuk_chat-${{ steps.version.outputs.VERSION }}-web.zip *

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            chuk_chat-${{ steps.version.outputs.VERSION }}-web.zip
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          cname: chat.chuk.dev  # Optional: Set your custom domain

