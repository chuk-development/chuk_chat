name: Release - macOS

on:
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: '3.27.3'

jobs:
  build-macos:
    name: Build macOS DMG & PKG
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: macos

      - name: Install Fastlane
        run: |
          cd macos
          bundle install

      - name: Install create-dmg
        run: brew install create-dmg

      # Optional: Setup code signing
      # Uncomment when certificates are configured
      # - name: Import certificates
      #   env:
      #     CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      #     CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      #     KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      #   run: |
      #     # Create temporary keychain
      #     security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
      #     security default-keychain -s build.keychain
      #     security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
      #     security set-keychain-settings -t 3600 -u build.keychain
      #
      #     # Import certificate
      #     echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
      #     security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
      #     rm certificate.p12

      - name: Build macOS app
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cd macos
          # Build without signing for now (comment out when certificates ready)
          bundle exec fastlane build
          # Use this when certificates are configured:
          # bundle exec fastlane build_dmg
          # bundle exec fastlane build_pkg

      - name: Create ZIP of app bundle (temporary until signing configured)
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../chuk_chat-macos.zip chuk_chat.app

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            chuk_chat-macos.zip
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # When DMG/PKG are built:
      # - name: Upload DMG and PKG to GitHub Release
      #   uses: softprops/action-gh-release@v1
      #   with:
      #     files: |
      #       build/macos/chuk_chat.dmg
      #       build/macos/chuk_chat.pkg
