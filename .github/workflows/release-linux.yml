name: Release - Linux

on:
  # Run after Android release completes
  workflow_run:
    workflows: ["Release - Android"]
    types:
      - completed

# Only one release build at a time
concurrency:
  group: release-builds
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.38.7'

jobs:
  build-linux:
    name: Build Linux Flatpak & AppImage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Only run if Android workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Building version: $VERSION"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libstdc++-12-dev libfuse2 wget file \
            flatpak flatpak-builder libsecret-1-dev

      - name: Setup Flatpak runtimes
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: linux

      - name: Install Fastlane
        run: |
          cd linux
          bundle install

      - name: Build Linux packages with Fastlane
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cd linux
          bundle exec fastlane release

      - name: Create portable tarball
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../chuk_chat-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz *

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: |
            chuk_chat-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz
            chuk_chat-${{ steps.version.outputs.VERSION }}-linux.flatpak
            chuk_chat-${{ steps.version.outputs.VERSION }}-x86_64.AppImage
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: chuk_chat-${{ steps.version.outputs.VERSION }}-linux.flatpak
          retention-days: 7

