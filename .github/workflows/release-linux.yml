name: Release - Linux

on:
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: '3.27.3'

jobs:
  build-linux:
    name: Build Linux AppImage, DEB, RPM
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libstdc++-12-dev rpm fuse libfuse2 wget file

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build linux --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_MEDIA_MANAGER=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --tree-shake-icons

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create portable tarball
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../chuk_chat-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz *

      - name: Install appimagetool
        run: |
          wget -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/

      - name: Build AppImage
        run: |
          chmod +x scripts/package-linux.sh
          ./scripts/package-linux.sh appimage ${{ steps.version.outputs.VERSION }}

      - name: Build DEB package
        run: |
          ./scripts/package-linux.sh deb ${{ steps.version.outputs.VERSION }}

      - name: Build RPM package
        run: |
          ./scripts/package-linux.sh rpm ${{ steps.version.outputs.VERSION }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            chuk_chat-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz
            chuk_chat-${{ steps.version.outputs.VERSION }}-x86_64.AppImage
            chuk_chat_${{ steps.version.outputs.VERSION }}_amd64.deb
            chuk_chat-${{ steps.version.outputs.VERSION }}-1.x86_64.rpm
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

