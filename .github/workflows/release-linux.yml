name: Release - Linux

on:
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: '3.27.3'

jobs:
  build-linux:
    name: Build Linux Flatpak, AppImage, DEB, RPM
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libstdc++-12-dev rpm fuse libfuse2 wget file \
            flatpak flatpak-builder

      - name: Setup Flatpak runtimes
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: linux

      - name: Install Fastlane
        run: |
          cd linux
          bundle install

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build all Linux packages with Fastlane
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cd linux
          bundle exec fastlane release

      - name: Create portable tarball
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../chuk_chat-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz *

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            chuk_chat-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz
            chuk_chat-${{ steps.version.outputs.VERSION }}-linux.flatpak
            chuk_chat-${{ steps.version.outputs.VERSION }}-x86_64.AppImage
            chuk_chat_${{ steps.version.outputs.VERSION }}_amd64.deb
            chuk_chat-${{ steps.version.outputs.VERSION }}-1.x86_64.rpm
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: chuk_chat-${{ steps.version.outputs.VERSION }}-linux.flatpak
          retention-days: 7

