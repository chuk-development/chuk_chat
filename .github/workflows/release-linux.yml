name: Release - Linux

on:
  # Run after Android release completes
  workflow_run:
    workflows: ["Release - Android"]
    types:
      - completed

# Only one release build at a time
concurrency:
  group: release-builds
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.38.7'

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run if Android workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Building version: $VERSION"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libstdc++-12-dev libfuse2 wget file libsecret-1-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Flutter Linux
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build linux --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=FEATURE_PROJECTS=true \
            --dart-define=FEATURE_IMAGE_GEN=true \
            --dart-define=FEATURE_MEDIA_MANAGER=true \
            --dart-define=FEATURE_VOICE_MODE=true \
            --tree-shake-icons

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps

          # Copy application files
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          # Create desktop entry
          cat > AppDir/usr/share/applications/chuk_chat.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=chuk_chat
          Comment=Privacy-focused chat app with E2E encryption
          Exec=chuk_chat
          Icon=chuk_chat
          Categories=Network;InstantMessaging;
          Terminal=false
          EOF

          # Copy icon
          if [ -f "web/icons/Icon-512.png" ]; then
            cp web/icons/Icon-512.png AppDir/usr/share/icons/hicolor/512x512/apps/chuk_chat.png
            cp web/icons/Icon-512.png AppDir/chuk_chat.png
          fi

          # Create AppRun
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin/:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib/:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/chuk_chat" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Copy desktop file to root
          cp AppDir/usr/share/applications/chuk_chat.desktop AppDir/

          # Build AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir chuk_chat-${VERSION}-x86_64.AppImage

      - name: Create portable tarball
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../chuk_chat-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz *

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: |
            chuk_chat-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz
            chuk_chat-${{ steps.version.outputs.VERSION }}-x86_64.AppImage
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
