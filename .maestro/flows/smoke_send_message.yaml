# smoke_send_message.yaml — Send a message in a new chat
appId: dev.chuk.chat

---

- runFlow: login.yaml

- tapOn:
    id: "new_chat_button"

- waitForAnimationToEnd

- tapOn:
    id: "message_input"
- inputText: "Hello, this is a Maestro smoke test"

- hideKeyboard

- tapOn:
    id: "send_button"

- waitForAnimationToEnd

# The sent message should appear as a bubble (not in the input field)
- extendedWaitUntil:
    visible: "Hello, this is a Maestro smoke test"
    timeout: 5000

# Wait for AI response (up to 45s) — look for disclaimer text that appears below AI messages
- extendedWaitUntil:
    visible: "AI/LLMs can make mistakes"
    timeout: 45000

- takeScreenshot: smoke_send_message
