# login.yaml — Login subflow (reused by other flows)
# Requires TEST_EMAIL and TEST_PASSWORD env vars
appId: dev.chuk.chat

---

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "Welcome to Chuk Chat"
    timeout: 15000

- tapOn:
    id: "login_email_field"
- inputText: ${TEST_EMAIL}

- tapOn:
    id: "login_password_field"
- inputText: ${TEST_PASSWORD}

- hideKeyboard

- tapOn:
    id: "login_submit_button"

- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Chuk Chat"
    timeout: 15000
