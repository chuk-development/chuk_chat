server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm;
    gzip_min_length 256;

    # Block access to dotfiles (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # favicon.ico fallback to favicon.png
    location = /favicon.ico {
        try_files /favicon.ico /favicon.png =404;
    }

    # Never cache index.html and service worker (so Cloudflare always revalidates)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Cache static assets (Flutter adds content hashes to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Flutter web SPA - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
